services:
  - type: web
    name: cefr-coach-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements-prod.txt
    startCommand: bash startup.sh
    plan: free
    envVars:
      - key: LLM_BASE_URL
        sync: false
      - key: LLM_MODEL
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: USE_MOCK_CLASSIFIER
        value: "false"
